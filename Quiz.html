<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Bestattung bei Griechen und Römern</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --stone: #f0e8d8;
    --parchment: #e8dcc8;
    --dark: #2a1f12;
    --mid: #5c4433;
    --gold: #c8a84b;
    --gold-light: #e8c96a;
    --terra: #a84832;
    --blue-greek: #2e4a7a;
    --cream: #faf5ec;
    --shadow: rgba(42,31,18,0.25);
  }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* Stone texture background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(200,168,75,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(168,72,50,0.06) 0%, transparent 50%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.01) 2px,
        rgba(255,255,255,0.01) 4px
      );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 820px;
    position: relative;
    z-index: 1;
  }

  /* ---- HEADER ---- */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.8s ease both;
  }

  .header-deco {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .header-deco .line {
    height: 1px;
    width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .header-deco .symbol {
    color: var(--gold);
    font-size: 22px;
    font-family: 'Cinzel', serif;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: clamp(22px, 4vw, 38px);
    color: var(--gold-light);
    letter-spacing: 2px;
    text-shadow: 0 2px 12px rgba(200,168,75,0.3);
    line-height: 1.2;
  }

  .subtitle {
    color: rgba(240,232,216,0.6);
    font-size: 16px;
    margin-top: 8px;
    font-style: italic;
  }

  /* ---- PROGRESS BAR ---- */
  .progress-wrap {
    background: rgba(42,31,18,0.6);
    border: 1px solid rgba(200,168,75,0.2);
    border-radius: 4px;
    height: 6px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(200,168,75,0.5);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    color: rgba(240,232,216,0.5);
    font-size: 13px;
    margin-bottom: 8px;
    font-family: 'Cinzel', serif;
    letter-spacing: 1px;
  }

  /* ---- CARD ---- */
  .card {
    background: linear-gradient(145deg, var(--parchment) 0%, var(--stone) 100%);
    border-radius: 4px;
    border: 1px solid rgba(200,168,75,0.4);
    box-shadow: 0 8px 40px var(--shadow), 0 0 0 1px rgba(200,168,75,0.1) inset;
    padding: 40px 44px;
    position: relative;
    animation: fadeUp 0.5s ease both;
  }

  .card::before, .card::after {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  .card::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
  .card::after  { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

  /* ---- CATEGORY BADGE ---- */
  .category {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 2px;
    margin-bottom: 20px;
    font-weight: 700;
  }

  .cat-greek { background: rgba(46,74,122,0.15); color: var(--blue-greek); border: 1px solid rgba(46,74,122,0.3); }
  .cat-roman { background: rgba(168,72,50,0.12); color: var(--terra); border: 1px solid rgba(168,72,50,0.3); }
  .cat-both  { background: rgba(200,168,75,0.12); color: #7a5e00; border: 1px solid rgba(200,168,75,0.4); }

  /* ---- QUESTION ---- */
  .question-num {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: rgba(92,68,51,0.6);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .question-text {
    font-size: clamp(17px, 2.5vw, 22px);
    color: var(--dark);
    line-height: 1.5;
    margin-bottom: 28px;
    font-weight: 600;
  }

  /* ---- OPTIONS ---- */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  @media (max-width: 560px) {
    .options { grid-template-columns: 1fr; }
    .card { padding: 28px 22px; }
  }

  .option {
    background: rgba(42,31,18,0.06);
    border: 2px solid rgba(92,68,51,0.2);
    border-radius: 4px;
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: all 0.18s ease;
    text-align: left;
    font-family: 'Crimson Text', serif;
    font-size: 17px;
    color: var(--dark);
    line-height: 1.4;
    position: relative;
    overflow: hidden;
  }

  .option:hover:not(:disabled) {
    background: rgba(200,168,75,0.1);
    border-color: var(--gold);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(200,168,75,0.2);
  }

  .option:disabled { cursor: default; }

  .option-letter {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 13px;
    min-width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: rgba(92,68,51,0.12);
    color: var(--mid);
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.18s ease;
  }

  .option.correct {
    background: rgba(56,128,72,0.15);
    border-color: #38804f;
    color: #1e4d2b;
  }
  .option.correct .option-letter {
    background: #38804f;
    color: white;
  }

  .option.wrong {
    background: rgba(168,72,50,0.12);
    border-color: var(--terra);
    color: #6b2415;
  }
  .option.wrong .option-letter {
    background: var(--terra);
    color: white;
  }

  .option.reveal-correct {
    background: rgba(56,128,72,0.08);
    border-color: rgba(56,128,72,0.5);
    color: #2a6038;
  }
  .option.reveal-correct .option-letter {
    background: rgba(56,128,72,0.2);
    color: #38804f;
  }

  /* ---- FEEDBACK ---- */
  .feedback {
    margin-top: 22px;
    padding: 16px 20px;
    border-radius: 3px;
    font-size: 16px;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.3s ease;
    display: none;
  }

  .feedback.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  .feedback.correct-fb {
    background: rgba(56,128,72,0.12);
    border-left: 3px solid #38804f;
    color: #1e4d2b;
  }
  .feedback.wrong-fb {
    background: rgba(168,72,50,0.1);
    border-left: 3px solid var(--terra);
    color: #6b2415;
  }

  .feedback strong { font-weight: 600; }

  /* ---- NEXT BUTTON ---- */
  .btn-next {
    margin-top: 28px;
    width: 100%;
    padding: 16px;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--mid) 0%, var(--dark) 100%);
    color: var(--gold-light);
    border: 1px solid rgba(200,168,75,0.4);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: none;
    box-shadow: 0 4px 16px rgba(42,31,18,0.3);
  }

  .btn-next:hover {
    background: linear-gradient(135deg, #7a5e00 0%, var(--mid) 100%);
    border-color: var(--gold);
    box-shadow: 0 4px 20px rgba(200,168,75,0.3);
    transform: translateY(-1px);
  }

  .btn-next.visible { display: block; animation: fadeUp 0.3s ease; }

  /* ---- RESULT SCREEN ---- */
  .result-screen {
    display: none;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .result-screen.show { display: block; }

  .score-ring {
    width: 140px;
    height: 140px;
    margin: 0 auto 28px;
    position: relative;
  }

  .score-ring svg {
    transform: rotate(-90deg);
  }

  .score-ring-bg { stroke: rgba(200,168,75,0.15); }
  .score-ring-fill {
    stroke: var(--gold);
    stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    filter: drop-shadow(0 0 6px rgba(200,168,75,0.5));
  }

  .score-number {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cinzel', serif;
    font-size: 34px;
    font-weight: 900;
    color: var(--gold-light);
    text-shadow: 0 2px 8px rgba(200,168,75,0.4);
  }

  .result-title {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 10px;
  }

  .result-subtitle {
    font-size: 18px;
    color: rgba(240,232,216,0.7);
    font-style: italic;
    margin-bottom: 32px;
  }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .breakdown-item {
    text-align: center;
  }

  .breakdown-num {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
  }

  .breakdown-label {
    font-size: 13px;
    color: rgba(240,232,216,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: 'Cinzel', serif;
  }

  .correct-count .breakdown-num { color: #6dbf85; }
  .wrong-count   .breakdown-num { color: #e07a6a; }

  .btn-restart {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 16px 48px;
    background: transparent;
    color: var(--gold-light);
    border: 1px solid rgba(200,168,75,0.5);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-restart:hover {
    background: rgba(200,168,75,0.1);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(200,168,75,0.2);
  }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- ORNAMENT ---- */
  .ornament {
    text-align: center;
    color: rgba(200,168,75,0.3);
    font-size: 20px;
    margin: 24px 0 0;
    letter-spacing: 8px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-deco">
      <div class="line"></div>
      <div class="symbol">&#9753;</div>
      <div class="line"></div>
    </div>
    <h1>Bestattung bei Griechen &amp; Römern</h1>
    <div class="subtitle">Quiz zum Vortrag</div>
  </div>

  <!-- QUIZ SECTION -->
  <div id="quiz-section">
    <div class="progress-label">
      <span id="q-counter">Frage 1 von 15</span>
      <span id="q-score">Punkte: 0</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
    </div>

    <div class="card" id="question-card">
      <div class="category" id="q-category"></div>
      <div class="question-num" id="q-num"></div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
      <div class="feedback" id="q-feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Nächste Frage &rarr;</button>
    </div>
    <div class="ornament">&#9670; &#9670; &#9670;</div>
  </div>

  <!-- RESULT SECTION -->
  <div class="card result-screen" id="result-screen">
    <div class="score-ring">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle class="score-ring-bg" cx="70" cy="70" r="58" fill="none" stroke-width="8"/>
        <circle class="score-ring-fill" id="ring-fill" cx="70" cy="70" r="58"
          fill="none" stroke-width="8"
          stroke-dasharray="364"
          stroke-dashoffset="364"/>
      </svg>
      <div class="score-number" id="final-score-num">0/15</div>
    </div>
    <div class="result-title" id="result-title"></div>
    <div class="result-subtitle" id="result-subtitle"></div>
    <div class="result-breakdown">
      <div class="breakdown-item correct-count">
        <div class="breakdown-num" id="correct-count">0</div>
        <div class="breakdown-label">Richtig</div>
      </div>
      <div class="breakdown-item wrong-count">
        <div class="breakdown-num" id="wrong-count">0</div>
        <div class="breakdown-label">Falsch</div>
      </div>
    </div>
    <button class="btn-restart" onclick="restart()">&#8635; Nochmal spielen</button>
  </div>

</div>

<script>
const questions = [
  {
    cat: 'greek', catLabel: '⊙ Griechen',
    text: 'Wie hieß der Fährmann, der die Seelen der Toten in die Unterwelt brachte?',
    options: ['Hermes', 'Charon', 'Hades', 'Thanatos'],
    correct: 1,
    explanation: 'Charon war der Fährmann, der die Seelen über den Fluss Styx oder Acheron brachte. Als Fahrgeld wurde dem Toten ein Obolus (Münze) mitgegeben.'
  },
  {
    cat: 'roman', catLabel: '⊕ Römer',
    text: 'Was bedeutet die Abkürzung D.M. auf römischen Grabsteinen?',
    options: ['Divus Mortuis', 'Dis Manibus sacrum', 'Domus Mortis', 'De Morte'],
    correct: 1,
    explanation: 'D.M. steht für "Dis Manibus sacrum" -- "den Totengeistern geweiht". Die Manen galten als Geister der Verstorbenen, die weiterhin Einfluss auf die Lebenden hatten.'
  },
  {
    cat: 'greek', catLabel: '⊙ Griechen',
    text: 'Wie hieß die Aufbahrung des Toten im Haus der Familie bei den Griechen?',
    options: ['Ekphora', 'Prothesis', 'Nekropole', 'Psychopompos'],
    correct: 1,
    explanation: 'Prothesis nannte man die Aufbahrung des Toten im Haus. Danach folgte am dritten Tag die Ekphora -- der Trauerzug zur Nekropole.'
  },
  {
    cat: 'roman', catLabel: '⊕ Römer',
    text: 'Welche römische Tugend beschreibt das pflichtbewusste, ehrfürchtige Verhalten gegenüber Göttern, Eltern und Familie?',
    options: ['Virtus', 'Pietas', 'Gravitas', 'Fides'],
    correct: 1,
    explanation: 'Pietas war eine zentrale römische Tugend und Teil des Mos maiorum (Traditionen der Vorfahren). Sie zeigte sich u.a. im Respekt vor Ahnen und in der Pflege der Bestattungsrituale.'
  },
  {
    cat: 'greek', catLabel: '⊙ Griechen',
    text: 'Welcher Bereich der griechischen Unterwelt war der Aufenthaltsort der meisten einfachen Seelen -- neutral und freudlos?',
    options: ['Elysium', 'Tartaros', 'Asphodelwiese', 'Olymp'],
    correct: 2,
    explanation: 'Die Asphodelwiese war der Aufenthaltsort der meisten Seelen. Elysium war für Helden und Gerechte; Tartaros war der Strafbereich für schwere Vergehen.'
  },
  {
    cat: 'roman', catLabel: '⊕ Römer',
    text: 'Wie hieß der feierliche Leichenzug bei den Römern?',
    options: ['Parentalia', 'Ekphora', 'Pompa funebris', 'Rosalia'],
    correct: 2,
    explanation: 'Pompa funebris war der offizielle Leichenzug vom Haus zum Grab. Er war der öffentliche, repräsentative Teil des Rituals und wurde genutzt, um Abstammung und Status der Familie zu zeigen.'
  },
  {
    cat: 'greek', catLabel: '⊙ Griechen',
    text: 'Welcher Gott führte als Seelengeleiter (Psychopompos) die Seelen in die Unterwelt?',
    options: ['Apollo', 'Ares', 'Hermes', 'Dionysos'],
    correct: 2,
    explanation: 'Hermes übernahm als Psychopompos die Aufgabe, Seelen sicher in die Unterwelt zu geleiten. Der Begriff Psychopompos bedeutet wörtlich "Seelenführer".'
  },
  {
    cat: 'roman', catLabel: '⊕ Römer',
    text: 'Welche Gefahr drohte laut römischem Glauben, wenn die Toten nicht ordentlich geehrt wurden?',
    options: ['Die Götter bestraften die Stadt', 'Die Manen kehrten als Lemures zurück', 'Der Leichnam verweste nicht', 'Die Ernte fiel aus'],
    correct: 1,
    explanation: 'Vernachlässigte Manen konnten als Lemures oder Larvae zurückkehren -- unruhige, furchterregende Geister, die Unheil brachten. Deshalb war die regelmäßige Totenpflege so wichtig.'
  },
  {
    cat: 'both', catLabel: '⟳ Beide Kulturen',
    text: 'Was war eine wichtige Gemeinsamkeit beider Kulturen im Umgang mit den Toten?',
    options: [
      'Beide bestatteten ausschließlich durch Verbrennung',
      'Beide sahen die ordnungsgemäße Bestattung als Pflicht, damit die Seele Ruhe findet',
      'Beide verboten Grabbeigaben durch Gesetze',
      'Beide bestatteten innerhalb der Stadtmauern'
    ],
    correct: 1,
    explanation: 'In beiden Kulturen galt die ordnungsgemäße Bestattung als absolute Pflicht der Familie. Ohne korrektes Begräbnis konnte die Seele den Weg in die Unterwelt nicht antreten.'
  },
  {
    cat: 'greek', catLabel: '⊙ Griechen',
    text: 'Was waren Lekythen, die häufig als Grabbeigabe verwendet wurden?',
    options: ['Grabplatten aus Marmor', 'Ölfläschchen für Salbung und Libationen', 'Münzen für den Fährmann', 'Kleidungsstücke des Verstorbenen'],
    correct: 1,
    explanation: 'Lekythen waren Ölfläschchen, die für die Salbung des Leichnams und für Libationen (Trankopfer) am Grab verwendet wurden. Sie waren typische Grabbeigaben und Gedenkzeichen.'
  },
  {
    cat: 'roman', catLabel: '⊕ Römer',
    text: 'Was war die primäre Brandbestattung bei den Römern?',
    options: [
      'Verbrennung auf separatem Scheiterhaufen, Asche in Urne',
      'Verbrennung direkt über der Grabgrube',
      'Verbrennung im Kolumbarium',
      'Verbrennung mit anschließender Seebestattung'
    ],
    correct: 1,
    explanation: 'Bei der primären Brandbestattung war der Verbrennungsplatz gleichzeitig das Grab -- der Leichnam wurde direkt über der Grabgrube verbrannt. Bei der sekundären Variante erfolgte die Verbrennung separat, die Asche wurde danach in einer Urne beigesetzt.'
  },
  {
    cat: 'roman', catLabel: '⊕ Römer',
    text: 'Welche Grabform diente den Römern als Massenbestattungsstätte, besonders für ärmere Bevölkerungsschichten?',
    options: ['Tumulus', 'Sarkophag', 'Kolumbarium', 'Tempietto'],
    correct: 2,
    explanation: 'Kolumbarien waren Nischengräber, in denen viele Urnen unter einem Dach untergebracht wurden. Nekropolen lagen stets außerhalb der Stadtmauern.'
  },
  {
    cat: 'greek', catLabel: '⊙ Griechen',
    text: 'Wie hieß der Trauerzug von der Aufbahrung zur Grabstätte bei den Griechen?',
    options: ['Prothesis', 'Ekphora', 'Psychopompos', 'Katabasis'],
    correct: 1,
    explanation: 'Ekphora nannte man den Trauerzug, der am dritten Tag nach dem Tod stattfand. Dabei begleiteten Angehörige und Klagefrauen den Leichnam mit Gesängen und rituellen Handlungen zur Nekropole.'
  },
  {
    cat: 'roman', catLabel: '⊕ Römer',
    text: 'Welches Fest ehrten die Römer als Ahnenfest, bei dem verstorbene Familienmitglieder gedacht wurde?',
    options: ['Saturnalia', 'Parentalia', 'Rosalia', 'Lupercalia'],
    correct: 1,
    explanation: 'Parentalia war ein mehrtägiges Fest, bei dem die Römer ihrer verstorbenen Vorfahren gedachten. Verbunden waren damit Rituale an den Gräbern sowie Opfergaben. Rosalia waren ergänzende Rosenzeremonien.'
  },
  {
    cat: 'both', catLabel: '⟳ Beide Kulturen',
    text: 'Welcher wichtige Unterschied bestand zwischen griechischen und römischen Bestattungspraktiken?',
    options: [
      'Nur Griechen verwendeten Grabbeigaben',
      'Römer entwickelten ein stärker formalisiertes System mit Kolumbarien und Urnenbestattung; Griechen betonten stärker die häusliche Prothesis',
      'Nur Römer kannten Brandbestattung',
      'Griechen bestatteten ausschließlich außerhalb der Stadt'
    ],
    correct: 1,
    explanation: 'Römer entwickelten ein stärker institutionalisiertes Bestattungswesen mit Kolumbarien und Urnentraditionen sowie einer klaren räumlichen Trennung von Wohn- und Grabbereich. Die griechische Praxis war stärker durch die häusliche Prothesis und regionale Vielfalt geprägt.'
  }
];

let current = 0;
let score = 0;
let answered = false;

const total = questions.length;

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Shuffle questions order on start
let questionOrder = [];

function init() {
  questionOrder = shuffleArray([...Array(total).keys()]);
  current = 0; score = 0; answered = false;
  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('result-screen').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const qi = questionOrder[current];
  const q = questions[qi];
  answered = false;

  // Progress
  document.getElementById('q-counter').textContent = `Frage ${current + 1} von ${total}`;
  document.getElementById('q-score').textContent = `Punkte: ${score}`;
  const pct = (current / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';

  // Category
  const catEl = document.getElementById('q-category');
  catEl.textContent = q.catLabel;
  catEl.className = 'category';
  if (q.cat === 'greek') catEl.classList.add('cat-greek');
  else if (q.cat === 'roman') catEl.classList.add('cat-roman');
  else catEl.classList.add('cat-both');

  document.getElementById('q-num').textContent = `Frage ${current + 1}`;
  document.getElementById('q-text').textContent = q.text;

  // Options
  const optContainer = document.getElementById('q-options');
  optContainer.innerHTML = '';
  const letters = ['A','B','C','D'];
  // Shuffle options but keep track of correct answer
  const indices = shuffleArray([0,1,2,3]);
  let newCorrectIndex = 0;
  indices.forEach((origIdx, newIdx) => {
    if (origIdx === q.correct) newCorrectIndex = newIdx;
  });

  indices.forEach((origIdx, newIdx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.dataset.orig = origIdx;
    btn.dataset.isCorrect = (origIdx === q.correct) ? '1' : '0';
    btn.innerHTML = `<span class="option-letter">${letters[newIdx]}</span><span>${q.options[origIdx]}</span>`;
    btn.onclick = () => selectOption(btn, origIdx === q.correct, newCorrectIndex, qi);
    optContainer.appendChild(btn);
  });

  // Reset feedback + next button
  const fb = document.getElementById('q-feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const btnNext = document.getElementById('btn-next');
  btnNext.className = 'btn-next';
  btnNext.textContent = current < total - 1 ? 'Nächste Frage →' : 'Ergebnis anzeigen →';

  // Animate card
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  void card.offsetHeight;
  card.style.animation = 'fadeUp 0.4s ease both';
}

function selectOption(btn, isCorrect, correctNewIdx, qi) {
  if (answered) return;
  answered = true;

  const q = questions[qi];
  const allOptions = document.querySelectorAll('.option');

  allOptions.forEach((opt, i) => {
    opt.disabled = true;
    if (opt.dataset.isCorrect === '1') opt.classList.add('reveal-correct');
  });

  const fb = document.getElementById('q-feedback');

  if (isCorrect) {
    score++;
    btn.classList.remove('reveal-correct');
    btn.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `<strong>Richtig!</strong> ${q.explanation}`;
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `<strong>Leider falsch.</strong> ${q.explanation}`;
  }

  document.getElementById('q-score').textContent = `Punkte: ${score}`;
  document.getElementById('btn-next').classList.add('visible');
}

function nextQuestion() {
  current++;
  if (current >= total) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-section').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const pct = score / total;
  document.getElementById('final-score-num').textContent = `${score}/${total}`;
  document.getElementById('correct-count').textContent = score;
  document.getElementById('wrong-count').textContent = total - score;

  // Titles
  let title, sub;
  if (pct >= 0.93) { title = 'Außerordentlich!'; sub = 'Du hast den Stoff perfekt verstanden.'; }
  else if (pct >= 0.8) { title = 'Sehr gut!'; sub = 'Starkes Ergebnis -- du kennst dich gut aus.'; }
  else if (pct >= 0.65) { title = 'Gut!'; sub = 'Solides Wissen, ein paar Details noch vertiefen.'; }
  else if (pct >= 0.5) { title = 'Befriedigend'; sub = 'Die Grundlagen sitzen, aber noch Luft nach oben.'; }
  else { title = 'Weitermachen!'; sub = 'Lies deine Karteikarten nochmal durch -- du schaffst das.'; }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-subtitle').textContent = sub;

  // Animate ring
  const circumference = 364;
  const offset = circumference - (pct * circumference);
  setTimeout(() => {
    document.getElementById('ring-fill').style.strokeDashoffset = offset;
  }, 100);
}

function restart() {
  document.getElementById('result-screen').classList.remove('show');
  init();
}

init();
</script>

</html>
